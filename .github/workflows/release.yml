name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: zip -r lexitrack-public.zip public/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lexitrack-public.zip
